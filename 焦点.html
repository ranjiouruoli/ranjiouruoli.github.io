<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弹性布局焦点图效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .carousel-container {
            width: 616px;
            margin: 40px auto;
            position: relative;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            background: #fff;
            padding: 8px;
        }

        .banner-wrapper {
            position: relative;
            width: 616px;
            height: 237px;
            border-radius: 16px;
            overflow: hidden;
        }

        .main-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            pointer-events: none;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 49px;
            height: 49px;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            z-index: 10;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
        }

        .arrow-left {
            left: 0;
        }

        .arrow-right {
            right: 0;
        }

        .arrow:hover {
            transform: translateY(-50%) scale(1.08);
            opacity: 0.85;
        }

        .arrow:active {
            transform: translateY(-50%) scale(0.96);
        }

        .points-area {
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 18px;
            z-index: 10;
            background: transparent;
            padding: 6px 12px;
        }

        .point {
            width: 12px;
            height: 11px;
            display: block;
            transition: all 0.1s ease;
        }

        .point-img {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .carousel-container {
                width: 100%;
                max-width: 616px;
                margin: 20px;
            }
            .banner-wrapper {
                width: 100%;
                height: auto;
                aspect-ratio: 616 / 237;
            }
            .main-image {
                width: 100%;
                height: auto;
                aspect-ratio: 616 / 237;
                object-fit: cover;
            }
            .points-area {
                bottom: 8px;
                gap: 14px;
            }
        }
    </style>
</head>
<body>
<div class="carousel-container">
    <div class="banner-wrapper">
        <img class="main-image" src="banner1.jpg" alt="banner" draggable="false">
        <img class="arrow arrow-left" src="arrow1.png" alt="左箭头" draggable="false">
        <img class="arrow arrow-right" src="arrow2.png" alt="右箭头" draggable="false">
        <div class="points-area" id="pointsContainer"></div>
    </div>
</div>

<script>
    (function() {
        const POINT_NORMAL = 'point1.png';
        const POINT_ACTIVE = 'point2.png';
        const TOTAL_POINTS = 4;
        let activeIndex = 0;

        const pointsContainer = document.getElementById('pointsContainer');
        const leftArrow = document.querySelector('.arrow-left');
        const rightArrow = document.querySelector('.arrow-right');

        function buildPoints() {
            pointsContainer.innerHTML = '';
            for (let i = 0; i < TOTAL_POINTS; i++) {
                const pointDiv = document.createElement('div');
                pointDiv.className = 'point';
                const img = document.createElement('img');
                img.className = 'point-img';
                img.src = i === activeIndex ? POINT_ACTIVE : POINT_NORMAL;
                img.alt = '指示点';
                img.draggable = false;
                pointDiv.appendChild(img);
                pointsContainer.appendChild(pointDiv);
            }
        }

        function updatePointsUI() {
            const points = document.querySelectorAll('.point');
            for (let i = 0; i < points.length; i++) {
                const imgElement = points[i].querySelector('.point-img');
                if (imgElement) {
                    imgElement.src = i === activeIndex ? POINT_ACTIVE : POINT_NORMAL;
                }
            }
        }

        function moveLeft() {
            if (activeIndex > 0) {
                activeIndex--;
                updatePointsUI();
            }
        }

        function moveRight() {
            if (activeIndex < TOTAL_POINTS - 1) {
                activeIndex++;
                updatePointsUI();
            }
        }

        leftArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            moveLeft();
        });

        rightArrow.addEventListener('click', (e) => {
            e.stopPropagation();
            moveRight();
        });

        buildPoints();
    })();
</script>
</body>
</html>
