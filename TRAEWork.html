    <style>
      :root {
        --beijing: #070808;
        --mianban: #141414;
        --xian: #2a2a2a;
        --wenzi: #f5f5f5;
        --hui: #8a8f8b;
        --lv: #16d672;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0f0a;
        color: var(--wenzi);
        font-family:
          "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        padding-top: 54px;
        min-height: 100vh;
        position: relative;
      }
      #huabu {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: -1;
        pointer-events: none;
      }
      .daohang {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 54px;
        padding: 0 22px;
        background: rgba(7, 8, 8, 0.72);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .daohangzuo {
        display: flex;
        align-items: center;
        gap: 26px;
      }
      .logo {
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 1px;
        padding: 2px 7px;
        border-radius: 4px;
        line-height: 1;
      }
      .caidan {
        display: flex;
        align-items: center;
        gap: 22px;
      }
      .caidan a,
      .caidanxiang {
        color: var(--wenzi);
        font-size: 13.5px;
        text-decoration: none;
        cursor: pointer;
        opacity: 0.9;
        white-space: nowrap;
      }
      .caidan a:hover,
      .caidanxiang:hover {
        opacity: 1;
      }
      .caidanxiang {
        position: relative;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .daohangyou {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .denglu {
        color: var(--wenzi);
        font-size: 13.5px;
        text-decoration: none;
        opacity: 0.9;
      }
      .lvanniu {
        background: var(--lv);
        color: #06210f;
        font-size: 13.5px;
        font-weight: 600;
        text-decoration: none;
        padding: 7px 16px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        border: none;
        transition: filter 0.15s;
      }
      .lvanniu:hover {
        filter: brightness(1.08);
      }
      .xialacaidan {
        position: absolute;
        top: 30px;
        left: -12px;
        width: 248px;
        background: var(--mianban);
        border: 1px solid var(--xian);
        border-radius: 12px;
        padding: 8px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-6px);
        transition: 0.18s ease;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      }
      .caidanxiang:hover .xialacaidan {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .xialaixiang {
        display: flex;
        gap: 11px;
        padding: 9px 10px;
        border-radius: 8px;
        cursor: pointer;
      }
      .xialaixiang:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .xialiaotubiao {
        flex: none;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: #222;
        border: 1px solid #313131;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #cfcfcf;
      }
      .xialiaowenzi {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .xialiaobiaoqian {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13.5px;
        font-weight: 600;
        color: var(--wenzi);
      }
      .xinpin {
        font-size: 9px;
        font-weight: 700;
        color: var(--lv);
        border: 1px solid rgba(22, 214, 114, 0.5);
        border-radius: 4px;
        padding: 1px 4px;
      }
      .xialiaojiemie {
        font-size: 11.5px;
        color: var(--hui);
      }
      .jianshe {
        background: linear-gradient(
          90deg,
          #46f5a3 0%,
          #16d672 45%,
          #3aa0ff 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .kuangjia {
        max-width: 880px;
        margin: 0 auto;
        padding: 56px 20px 0px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .meijie {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 18px;
      }
      .shiyong {
        font-size: 11px;
        font-weight: 700;
        color: #0c2b1a;
        background: var(--lv);
        border-radius: 4px;
        padding: 2px 6px;
      }
      .dabiaoti {
        font-size: 58px;
        font-weight: 800;
        letter-spacing: 4px;
        line-height: 1.1;
        text-align: center;
        margin-bottom: 40px;
        background: linear-gradient(
          100deg,
          #ffffff 0%,
          #d7fbe9 40%,
          #34e39a 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .shurukuang {
        width: 100%;
        background: var(--mianban);
        border: 1px solid #2c2c2c;
        border-radius: 16px;
        padding: 18px 18px 12px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        margin-bottom: 26px;
      }
      .shurukuang textarea {
        width: 100%;
        min-height: 120px;
        resize: none;
        background: transparent;
        border: none;
        outline: none;
        color: var(--wenzi);
        font-size: 15px;
        line-height: 1.6;
        font-family: inherit;
      }
      .shurukuang textarea::placeholder {
        color: #6c706d;
      }
      .gongjulan {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #242424;
      }
      .gongju {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tubiaoanniu {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid #2e2e2e;
        color: #b9bdba;
        cursor: pointer;
        transition: 0.15s;
      }
      .tubiaoanniu:hover {
        background: #1e1e1e;
        color: var(--wenzi);
      }
      .fasonganniu {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: var(--lv);
        color: #06210f;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: filter 0.15s;
      }
      .fasonganniu:hover {
        filter: brightness(1.08);
      }

      .kawaili {
        width: 100%;
        margin-top: 0px;
        position: relative;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          transparent 50%,
          #0a120c 100%
        );
        border-radius: 24px;
        padding-bottom: 180px;
      }

      .kawaili::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 224, 143, 0.9) 0%,
          rgba(0, 224, 143, 0.4) 40%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 2;
      }

      .kawaili::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 180px;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 224, 143, 0.35) 0%,
          rgba(0, 224, 143, 0.12) 30%,
          rgba(0, 224, 143, 0.03) 50%,
          transparent 70%
        );
        mask-image: radial-gradient(
          ellipse at center,
          black 0%,
          black 25%,
          transparent 55%
        );
        -webkit-mask-image: radial-gradient(
          ellipse at center,
          black 0%,
          black 25%,
          transparent 55%
        );
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        pointer-events: none;
        z-index: 1;
      }

      .kapaixu {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        position: relative;
        z-index: 2;
      }

      .kapian {
        flex: 1 1 calc(50% - 7px);
        min-width: 260px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(20, 20, 20, 0.5);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(38, 38, 38, 0.5);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: 0.18s;
        color: var(--wenzi);
      }

      .kapian:hover {
        background: rgba(27, 27, 27, 0.7);
        border-color: rgba(58, 58, 58, 0.7);
        transform: translateY(-2px);
      }

      .katubiao {
        flex: none;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: #202020;
        border: 1px solid #313131;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--lv);
      }

      .kawenzi {
        font-size: 13.5px;
        color: #d6d6d6;
        line-height: 1.4;
      }

        }

          letter-spacing: 2px;
        }
        .kapian {
          flex: 1 1 100%;
        }
        .kawaili {
          padding-bottom: 120px;
        }
      }
    </style>

    <script>
      var huabu = document.getElementById("huabu");
      var h = huabu.getContext("2d");

      var dian = [];
      var shubiaoX = -1000;
      var shubiaoY = -1000;
      var dianDaxiao = 2;
      var dianJuli = 30;
      var guangquan = 150;

      function chushihuaDian() {
        dian = [];
        var lie = Math.ceil(window.innerWidth / dianJuli) + 2;
        var hang = Math.ceil(window.innerHeight / dianJuli) + 2;

        for (var i = 0; i < lie; i++) {
          for (var j = 0; j < hang; j++) {
            dian.push({
              x: i * dianJuli,
              y: j * dianJuli,
            });
          }
        }
      }

      function jisuanLiangdu(dianX, dianY) {
        var chaX = dianX - shubiaoX;
        var chaY = dianY - shubiaoY;
        var juli = Math.sqrt(chaX * chaX + chaY * chaY);

        if (juli > guangquan) {
          return 0.15;
        }

        var liangdu = 1 - juli / guangquan;
        return 0.15 + liangdu * 0.85;
      }

      function huahua() {
        h.clearRect(0, 0, huabu.width, huabu.height);
        h.fillStyle = "#0a0f0a";
        h.fillRect(0, 0, huabu.width, huabu.height);

        for (var i = 0; i < dian.length; i++) {
          var d = dian[i];
          var liang = jisuanLiangdu(d.x, d.y);
          var lvZhi = Math.floor(42 + liang * 213);
          var touming = 0.3 + liang * 0.7;
          h.fillStyle = "rgba(42, " + lvZhi + ", 110, " + touming + ")";
          h.beginPath();
          h.arc(d.x, d.y, dianDaxiao, 0, Math.PI * 2);
          h.fill();
        }

        requestAnimationFrame(huahua);
      }

      function tiaozhengHuabu() {
        huabu.width = window.innerWidth;
        huabu.height = window.innerHeight;
        chushihuaDian();
