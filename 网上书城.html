<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>网上书城注册</title>
<style>
div{
border:1px solid #666;
width:500px;
margin:0 auto;
}
.top{
background:#777;
color:#fff;
text-align:center;
padding:5px;
font-size:18px;
border:none;
}
.sub{
background:#eee;
padding:4px 10px;
border-top:none;
border-left:none;
border-right:none;
}
form{
padding:20px 100px;
border:none;
}
p{
margin:10px 0;
}
input{
width:200px;
}
input[type="submit"]{
background:#555;
color:#fff;
border:none;
padding:3px;
}
</style>
</head>
<body>
<div>
<div class="top">网上书城</div>
<div class="sub">+ 注册新用户</div>
<form>
<p>👤用户名<br><input type="text"></p>
<p>🔑密码<br><input type="password"></p>
<p>🔑确认密码<br><input type="password"></p>
<p>📧电子邮件<br><input type="email"></p>
<p><input type="submit" value="注册新用户"></p>
</form>
</div>
</body>
</html>
