<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>如何培养认真严谨的习惯</title>
    <style>
        img{
            width: 480px;
            height: 180px;
            float: left;
            margin-right: 10px;
            margin-top: 100px;
        }
        body {
            font-family: "楷体", sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        h1 {
            font-size: 48px;
            color: #888888;
            text-align: center;
            margin: 0 0 15px;
            font-weight: normal;
        }
        h1 span {
            color: #2c7cd5;
        }
        .meta {
            font-size: 22px;
            color: #2c7cd5;
            text-align: center;
            margin-bottom: 20px;
        }
        ul {
            list-style: none;
            font-size: 20px;
            line-height: 2.2;
            padding: 0;
            margin: 0;
        }
        li .red {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./1.jpg" alt="态度决定一切 细节决定成败">
        <div class="content">
            <h1>如何培养<span>认真严谨</span>的习惯</h1>
            <div class="meta"><span style="color: #888888;"><span>时间:</span></span>2022年02月21日17时26分 &nbsp;&nbsp;<span style="color: #888888;">来源:</span>思政教育</div>
            <ul>
                <li>◆ <span class="red">反复确认</span>，做任何事情都要照顾到每一个细节并反复确认，<span class="red">要有一种能在脑子里“虚拟”整个事件过程的能力</span>，确保所有的节点都正常。</li>
                <li>◆ 想尽办法<span class="red">努力让不可能变为可能</span>，只有倾尽全力做了，才算是努力</li>
                <li>◆ <span class="red">结果导向</span>，一切以结果为导向，任何事情都是你的名片。还要思考你的结果和过程是否满足所有和你配合的人的需求。</li>
                <li>◆ 学会假设<span class="red">了解周围比你强的人</span>，观察他们的做事方法。遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</li>
            </ul>
        </div>
    </div>
</body>
</html>
